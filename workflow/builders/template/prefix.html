<!DOCTYPE html><html><head><meta charset="utf-8">
<title>C. orbiculare SUSS atlas</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.6/dist/vis-network.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/3Dmol/2.1.0/3Dmol-min.js"></script>
<style>
*{box-sizing:border-box}body{margin:0;height:100vh;display:flex;flex-direction:column;font-family:-apple-system,Helvetica,Arial,sans-serif;color:#222}
#title{padding:9px 16px;background:#2a6b8a;color:#fff;font-size:14px}
#wrap{display:flex;flex:1;min-height:0}
#net{flex:1;border-right:1px solid #ddd;background:#fbfbfb;min-width:0}
#divider{width:6px;cursor:col-resize;background:#e0e0e0;flex:none}
#divider:hover{background:#2a6b8a}
#side{width:520px;flex:none;overflow-y:auto;padding:12px 15px;background:#fff}
#net.collapsed{flex:none;width:0;border:none;overflow:hidden}
#side.collapsed{width:0;padding:0;overflow:hidden}
#viewbar{padding:4px 16px;background:#f0f4f6;border-bottom:1px solid #ddd;font-size:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
#viewbar button{font-size:11px;padding:2px 8px;margin-right:5px}
.viewgroup{display:flex;align-items:center;gap:3px;white-space:nowrap}
#netsearch{display:flex;align-items:center;gap:4px;margin-left:auto;min-width:250px;flex:0 1 390px}
#netsearch input{width:100%;min-width:150px;height:27px;border:1px solid #aeb9bf;border-radius:4px;padding:3px 30px 3px 9px;background:#fff;font-size:12px;color:#222}
#netsearch input::-webkit-search-cancel-button{-webkit-appearance:none;display:none}
#netsearch input:focus{outline:2px solid #2a6b8a;outline-offset:1px;border-color:#2a6b8a}
#clearsearch{width:24px;height:24px;padding:0!important;margin-left:-32px!important;margin-right:5px!important;border:0!important;background:transparent!important;font-size:17px!important;line-height:22px;color:#5f6b72}
#searchstatus{min-width:68px;color:#59666d;font-size:11px;white-space:nowrap}
h2{margin:0 0 4px;font-size:19px}h3{margin:12px 0 5px;font-size:12px;color:#2a6b8a;text-transform:uppercase;letter-spacing:.04em}
table{border-collapse:collapse;width:100%;font-size:12.5px}td{padding:3px 6px;border-bottom:1px solid #eee}td:first-child{color:#666;width:54%}
button{padding:5px 10px;border:1px solid #bbb;background:#fff;border-radius:5px;cursor:pointer;font-size:12px;margin:2px}
button.on{background:#2a6b8a;color:#fff;border-color:#2a6b8a}
a.dl{display:inline-block;padding:5px 12px;background:#1e8449;color:#fff;border-radius:5px;font-size:12px;text-decoration:none;margin:6px 0}
.hint{font-size:11px;color:#888;margin-top:4px}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;color:#fff}
.swatch{display:inline-block;width:12px;height:12px;border-radius:2px;vertical-align:middle;margin:0 2px}
.tabs{display:flex;gap:3px;border-bottom:2px solid #2a6b8a;margin:8px 0;flex-wrap:wrap}
.tab{padding:5px 10px;cursor:pointer;font-size:12px;border-radius:5px 5px 0 0;background:#eee}
.tab.on{background:#2a6b8a;color:#fff}
#v3d{width:100%;height:300px;border:1px solid #ddd;border-radius:6px;margin-top:6px;position:relative;background:#fff}
#treebox{border:1px solid #eee;border-radius:4px;overflow:auto;max-height:340px;margin-top:4px}
.pane{display:none}.pane.on{display:block}
.pane img{max-width:100%;border:1px solid #eee;border-radius:4px}
svg text{cursor:pointer;user-select:none}
svg .branch{cursor:pointer}
svg .branch:hover{stroke:#e67e22 !important;stroke-width:3px !important}
@media(max-width:700px){
 body{min-height:100vh;height:100vh}
 #title{line-height:18px}
 #viewbar{padding:5px 8px;gap:6px}
 #netsearch{margin-left:0;min-width:0;flex:1 0 100%;width:100%}
 #wrap{display:block;overflow-y:auto}
 #net{width:100%;height:52vh;min-height:300px;border-right:0;border-bottom:1px solid #ddd}
 #divider{display:none}
 #side{width:100%;height:auto;min-height:220px;overflow:visible}
 #net.collapsed{width:100%;height:0;min-height:0}
 #side.collapsed{display:none;width:100%}
}
</style></head><body>
<div id="title">__ATLAS_TITLE__</div>
<div id="viewbar"><span class="viewgroup"><b>View:</b> <button id="tgnet" onclick="toggleView('net')">Hide network</button><button id="tgside" onclick="toggleView('side')">Hide panel</button><span class="hint">&middot; drag the grey divider to resize</span></span><span class="viewgroup"><b>Download:</b> <button id="dlclustered" onclick="dlSummary('clustered')" title="One row per cluster: members, annotation, structural similarity (TM), sequence identity, SUSS %, pocket residues, RNAseq">⬇ clustered families (CSV)</button><button id="dlsingletons" onclick="dlSummary('singletons')" title="Proteins that did not join any structural cluster — same columns">⬇ singletons (CSV)</button></span><div id="netsearch" title="Search all fields or use gene:, annotation:, effectorp:, tmr:, structtm:, family:, novel:"><input id="searchinput" type="search" autocomplete="off" spellcheck="false" placeholder="Search gene, annotation, effector, TMR" aria-label="Search network clusters"><button id="clearsearch" type="button" title="Clear search" aria-label="Clear search">&times;</button><span id="searchstatus" aria-live="polite"></span></div></div><div id="wrap"><div id="net"></div><div id="divider"></div><div id="side"><p class="hint">Click a family node to load data, structure, tree &amp; downloads.</p></div></div>
<script>
function toggleView(w){var el=document.getElementById(w);var b=document.getElementById("tg"+w);var col=el.classList.toggle("collapsed");if(b)b.textContent=(col?"Show ":"Hide ")+(w==="net"?"network":"panel");if(typeof network!=="undefined"&&network&&!document.getElementById("net").classList.contains("collapsed")){setTimeout(function(){network.redraw();network.fit();},60);}}
(function(){var dragging=false;document.addEventListener("mousedown",function(e){if(e.target&&e.target.id==="divider"){dragging=true;e.preventDefault();}});document.addEventListener("mousemove",function(e){if(!dragging)return;var wrap=document.getElementById("wrap");var side=document.getElementById("side");var rect=wrap.getBoundingClientRect();var w=rect.right-e.clientX;if(w<120)w=120;if(w>rect.width-120)w=rect.width-120;side.style.width=w+"px";});document.addEventListener("mouseup",function(){if(dragging){dragging=false;if(typeof network!=="undefined"&&network){network.redraw();network.fit();}}});})();
