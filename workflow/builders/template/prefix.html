<title>C. orbiculare SUSS atlas</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.6/dist/vis-network.min.js"></script>

<style>
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,Helvetica,Arial,sans-serif;color:#222}
#title{padding:9px 16px;background:#2a6b8a;color:#fff;font-size:14px}
#wrap{display:flex;height:calc(100vh - 38px)}
#net{flex:1;border-right:1px solid #ddd;background:#fbfbfb;min-width:0}
#divider{width:6px;cursor:col-resize;background:#e0e0e0;flex:none}
#divider:hover{background:#2a6b8a}
#side{width:520px;flex:none;overflow-y:auto;padding:12px 15px;background:#fff}
#net.collapsed{flex:none;width:0;border:none;overflow:hidden}
#side.collapsed{width:0;padding:0;overflow:hidden}
#viewbar{padding:4px 16px;background:#f0f4f6;border-bottom:1px solid #ddd;font-size:12px}
#viewbar button{font-size:11px;padding:2px 8px;margin-right:5px}
h2{margin:0 0 4px;font-size:19px}h3{margin:12px 0 5px;font-size:12px;color:#2a6b8a;text-transform:uppercase;letter-spacing:.04em}
table{border-collapse:collapse;width:100%;font-size:12.5px}td{padding:3px 6px;border-bottom:1px solid #eee}td:first-child{color:#666;width:54%}
button{padding:5px 10px;border:1px solid #bbb;background:#fff;border-radius:5px;cursor:pointer;font-size:12px;margin:2px}
button.on{background:#2a6b8a;color:#fff;border-color:#2a6b8a}
a.dl{display:inline-block;padding:5px 12px;background:#1e8449;color:#fff;border-radius:5px;font-size:12px;text-decoration:none;margin:6px 0}
.hint{font-size:11px;color:#888;margin-top:4px}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;color:#fff}
.swatch{display:inline-block;width:12px;height:12px;border-radius:2px;vertical-align:middle;margin:0 2px}
.tabs{display:flex;gap:3px;border-bottom:2px solid #2a6b8a;margin:8px 0;flex-wrap:wrap}
.tab{padding:5px 10px;cursor:pointer;font-size:12px;border-radius:5px 5px 0 0;background:#eee}
.tab.on{background:#2a6b8a;color:#fff}
#v3d{width:100%;height:300px;border:1px solid #ddd;border-radius:6px;margin-top:6px;position:relative;background:#fff}
#treebox{border:1px solid #eee;border-radius:4px;overflow:auto;max-height:340px;margin-top:4px}
.pane{display:none}.pane.on{display:block}
.pane img{max-width:100%;border:1px solid #eee;border-radius:4px}
svg text{cursor:pointer;user-select:none}
svg .branch{cursor:pointer}
svg .branch:hover{stroke:#e67e22 !important;stroke-width:3px !important}
</style></head><body>
