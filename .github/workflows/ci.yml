name: CI

on:
  push:
  pull_request:

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: python -m pip install numpy pandas openpyxl pytest
      - name: Run focused unit tests
        run: python -m pytest -q
      - name: Compile workflow Python
        run: python -m compileall -q workflow/scripts workflow/builders portal tests
