name: CI

on:
  push:
  pull_request:

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run focused unit tests
        run: python -m unittest discover -s tests -v
      - name: Compile workflow Python
        run: python -m compileall -q workflow/scripts portal tests
